; platformio.ini
; Базовые настройки для всех плат
[env]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv
board_build.arduino.memory_type = qio_opi
board_build.filesystem = littlefs 
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L

build_flags = 
    -D BOARD_HAS_PSRAM
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D ELEGANTOTA_USE_ASYNC_WEBSERVER=1 ; ВАЖНО для ElegantOTA v3+

monitor_speed = 115200

lib_deps =
    SPI
    https://github.com/tdk-invn-oss/motion.arduino.ICM45605.git
    FastLED
    Time
    https://github.com/me-no-dev/AsyncTCP.git
    https://github.com/me-no-dev/ESPAsyncWebServer.git
    ayushsharma82/ElegantOTA @ ^3.1.0  ; Библиотека для Web OTA
    bblanchon/ArduinoJson @ ^6.21.3    ; Для парсинга списков Wi-Fi и файлов
    claws/BH1750 @ ^1.3.0              ; Датчик освещенности

; --------------------------------------------------------
; ОКРУЖЕНИЯ ДЛЯ ПРОШИВКИ (Выбираются внизу в VS Code)
; --------------------------------------------------------

; 1. Прошивка по USB-кабелю (по умолчанию)
[env:cable]
upload_protocol = esptool

; 2. Прошивка по воздуху (Плата dc14)
[env:wheel_dc14]
upload_protocol = espota
upload_port = 192.168.0.16
;upload_port = pov-wheel-dc14.local

; 3. Прошивка по воздуху (Плата 2348)
[env:wheel_2348]
upload_protocol = espota
upload_port = 192.168.0.8
;upload_port = pov-wheel-2348.local

; 4. Прошивка по воздуху (Плата 3)
[env:wheel_3]
upload_protocol = espota
upload_port = pov-wheel-5e6f.local

; 5. Прошивка по воздуху (Плата 4)
[env:wheel_4]
upload_protocol = espota
upload_port = pov-wheel-7g8h.local

; 6. Прошивка по воздуху (Плата 5)
[env:wheel_5]
upload_protocol = espota
upload_port = pov-wheel-9i0j.local