<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POV Wheel Control</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1e1e1e; color: #fff; margin: 0; padding: 20px; text-align: center; }
        .card { background: #2d2d2d; padding: 20px; margin: 0 auto 20px; border-radius: 12px; max-width: 500px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        h2, h3 { margin-top: 0; color: #4CAF50; }
        button { background: #4CAF50; color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; margin: 5px; }
        button:hover { background: #45a049; }
        button.danger { background: #f44336; }
        button.danger:hover { background: #da190b; }
        button.warning { background: #ff9800; width: 100%; margin-top: 10px; }
        button.warning:hover { background: #e68a00; }
        input[type="range"] { width: 100%; margin: 10px 0; }
        input[type="text"] { background: #3d3d3d; color: #fff; border: 1px solid #555; border-radius: 6px; width: 100%; margin-bottom: 15px; box-sizing: border-box; padding: 8px; }
        .file-item { display: flex; justify-content: space-between; align-items: center; background: #3d3d3d; padding: 10px; border-radius: 6px; margin-bottom: 8px; }
        #preview { border: 2px dashed #555; border-radius: 50%; margin-top: 15px; background: #000; }
        .telemetry p { margin: 8px 0; font-size: 1.1em; }
    </style>
</head>
<body>

<div class="card">
    <h2>1. Связь с ведомым (Slave)</h2>
    <button onclick="scanSlaves()">Поиск синего колеса</button>
    <div id="scanStatus" style="margin-top: 10px; color: #aaa;">Статус: Не проверено</div>
    <div id="foundDevice" style="margin-top: 15px; display: none;">
        Найден: <b id="devName"></b><br>
        <button onclick="pairDevice()" style="background: #28a745; margin-top: 10px;">Создать пару</button>
    </div>
</div>

<div class="card">
    <h2>2. Загрузка новой анимации/картинки</h2>
    <input type="file" id="fileInput" accept="image/*" style="margin-bottom: 10px;">
    <input type="text" id="fileNameInput" placeholder="Имя файла (например, logo)">
    <br><canvas id="preview" width="200" height="200" style="display:none;"></canvas><br>
    <button onclick="processAndUpload()" style="width: 100%; margin-top: 10px;">Конвертировать и Загрузить</button>
    <div id="uploadStatus" style="color: #aaa; margin-top: 10px;">Ожидание файла...</div>
</div>

<div class="card">
    <h2>3. Память устройства (LittleFS)</h2>
    <button onclick="loadFiles()">Обновить список</button>
    <button onclick="stopDisplay()" class="danger" style="width: 100%; margin-top: 10px;">Stop Display</button>
    <div id="fileList" style="margin-top: 15px; text-align: left;"></div>
</div>

<div class="card">
    <h2>4. Настройки "На лету"</h2>
    <label>Мин. Яркость: <span id="bMinVal">10</span>%</label>
    <input type="range" id="bMinSlide" min="1" max="50" value="10" onchange="syncSettings()">
    
    <label>Макс. Яркость: <span id="bMaxVal">50</span>%</label>
    <input type="range" id="bMaxSlide" min="1" max="50" value="50" onchange="syncSettings()">
    
    <label>Смещение угла: <span id="aVal">0</span>°</label>
    <input type="range" id="aSlide" min="0" max="360" value="0" onchange="syncSettings()">
</div>

<div class="card">
    <h2>5. Power / Battery Status</h2>
    <div class="telemetry" style="text-align: left; padding: 0 15px;">
        <p><b>Battery Voltage:</b> <span id="batV">--</span> V</p>
        <p><b>Charge Current:</b> <span id="batI">--</span> A</p>
        <p><b>Input Voltage:</b> <span id="busV">--</span> V</p>
        <p><b>Input Current:</b> <span id="busI">--</span> A</p>
    </div>
</div>

<div class="card">
    <h2>6. Система</h2>
    <button class="warning" onclick="fetch('/ping').then(() => window.location.href='/update')">OTA Обновление прошивки</button>
</div>

<script>
    // === ВНУТРЕННИЙ ПАРСЕР GIF (БЕЗ ВНЕШНИХ БИБЛИОТЕК И IMAGEDECODER) ===
    class MinimalGIF {
        constructor(buffer) {
            this.bytes = new Uint8Array(buffer);
            this.pos = 0;
            this.frames = [];
            this.width = 0;
            this.height = 0;
            this.globalColorTable = null;
        }
        readByte() { return this.bytes[this.pos++]; }
        readWord() { return this.readByte() | (this.readByte() << 8); }
        readBytes(n) { let b = this.bytes.subarray(this.pos, this.pos + n); this.pos += n; return b; }
        
        parse() {
            let sig = String.fromCharCode(...this.readBytes(6));
            if (sig !== 'GIF87a' && sig !== 'GIF89a') throw new Error("Это не формат GIF!");
            this.width = this.readWord();
            this.height = this.readWord();
            let packed = this.readByte();
            this.readByte(); this.readByte();
            
            let gctFlag = (packed & 0x80) !== 0;
            let gctSize = 2 << (packed & 7);
            if (gctFlag) this.globalColorTable = this.readBytes(gctSize * 3);
            
            let delay = 100, disposal = 0, transIndex = -1;
            
            while (this.pos < this.bytes.length) {
                let blockType = this.readByte();
                if (blockType === 0x3B) break; // EOF
                
                if (blockType === 0x21) { // Extension
                    let extType = this.readByte();
                    if (extType === 0xF9) { // Graphics Control Extension
                        this.readByte(); // Length
                        let gce = this.readByte();
                        disposal = (gce >> 2) & 7;
                        delay = this.readWord() * 10;
                        if (delay === 0) delay = 100; // Безопасный фоллбек
                        let tColor = this.readByte();
                        transIndex = (gce & 1) ? tColor : -1;
                        this.readByte(); // Terminator
                    } else {
                        // Skip unhandled extensions
                        let len; while ((len = this.readByte()) !== 0) this.pos += len;
                    }
                } else if (blockType === 0x2C) { // Image Descriptor
                    let x = this.readWord(), y = this.readWord(), w = this.readWord(), h = this.readWord();
                    let imgPacked = this.readByte();
                    let lctFlag = (imgPacked & 0x80) !== 0;
                    let lctSize = 2 << (imgPacked & 7);
                    let lct = lctFlag ? this.readBytes(lctSize * 3) : this.globalColorTable;
                    
                    let minCodeSize = this.readByte();
                    let imgData = [];
                    let len;
                    while ((len = this.readByte()) !== 0) {
                        for(let i = 0; i < len; i++) imgData.push(this.bytes[this.pos + i]);
                        this.pos += len;
                    }
                    let pixels = this.lzwDecode(minCodeSize, new Uint8Array(imgData), w * h);
                    this.frames.push({x, y, w, h, pixels, lct, delay, disposal, transIndex});
                }
            }
        }
        
        lzwDecode(minCodeSize, data, pixelCount) {
            const clearCode = 1 << minCodeSize;
            const eoiCode = clearCode + 1;
            let codeSize = minCodeSize + 1;
            let dictSize = clearCode + 2;
            let dict = [];
            for (let i = 0; i < clearCode; i++) dict[i] = [i];
            
            let output = new Uint8Array(pixelCount);
            let outPos = 0;
            let bitPos = 0;
            
            function readCode() {
                let bytePos = bitPos >> 3;
                let bitOffset = bitPos & 7;
                if (bytePos >= data.length) return -1;
                let val = data[bytePos] | (data[bytePos + 1] !== undefined ? data[bytePos + 1] << 8 : 0) | (data[bytePos + 2] !== undefined ? data[bytePos + 2] << 16 : 0);
                let code = (val >> bitOffset) & ((1 << codeSize) - 1);
                bitPos += codeSize;
                return code;
            }
            
            let oldCode = -1;
            while (outPos < pixelCount) {
                let code = readCode();
                if (code === -1 || code === eoiCode) break;
                if (code === clearCode) {
                    codeSize = minCodeSize + 1;
                    dictSize = clearCode + 2;
                    dict.length = clearCode + 2; 
                    oldCode = -1;
                    continue;
                }
                
                let sequence;
                if (code < dictSize) {
                    sequence = dict[code];
                } else if (code === dictSize && oldCode !== -1) {
                    sequence = Array.from(dict[oldCode]);
                    sequence.push(dict[oldCode][0]);
                } else {
                    break;
                }
                
                output.set(sequence, outPos);
                outPos += sequence.length;
                
                if (oldCode !== -1 && dictSize < 4096) {
                    let newEntry = Array.from(dict[oldCode]);
                    newEntry.push(sequence[0]);
                    dict[dictSize++] = newEntry;
                    if (dictSize === (1 << codeSize) && codeSize < 12) codeSize++;
                }
                oldCode = code;
            }
            return output;
        }
    }

    // Рендеринг всех распакованных кадров GIF с переводом в полярные координаты
    function renderGIFFrames(gif) {
        let canvas = document.createElement('canvas');
        canvas.width = gif.width; canvas.height = gif.height;
        let ctx = canvas.getContext('2d', {willReadFrequently: true});
        let framesData = [];
        
        for (let i = 0; i < gif.frames.length; i++) {
            let f = gif.frames[i];
            // Disposal Method 2: Очистка до фона (прозрачного)
            if (f.disposal === 2 && i > 0) {
                 ctx.clearRect(gif.frames[i-1].x, gif.frames[i-1].y, gif.frames[i-1].w, gif.frames[i-1].h);
            }
            
            let imgData = ctx.createImageData(f.w, f.h);
            let p = 0;
            for (let j = 0; j < f.pixels.length; j++) {
                let c = f.pixels[j];
                if (c !== f.transIndex && f.lct) {
                    imgData.data[p++] = f.lct[c*3];
                    imgData.data[p++] = f.lct[c*3+1];
                    imgData.data[p++] = f.lct[c*3+2];
                    imgData.data[p++] = 255;
                } else {
                    imgData.data[p++] = 0; imgData.data[p++] = 0; imgData.data[p++] = 0; imgData.data[p++] = 0; 
                }
            }
            
            let tempCanvas = document.createElement('canvas');
            tempCanvas.width = f.w; tempCanvas.height = f.h;
            tempCanvas.getContext('2d').putImageData(imgData, 0, 0);
            ctx.drawImage(tempCanvas, f.x, f.y);
            
            // Преобразование текущего кадра в полярную систему 200x200
            let sCanvas = document.createElement('canvas');
            sCanvas.width = 200; sCanvas.height = 200;
            let sCtx = sCanvas.getContext('2d');
            let size = Math.min(gif.width, gif.height);
            sCtx.drawImage(canvas, (gif.width - size)/2, (gif.height - size)/2, size, size, 0, 0, 200, 200);
            
            let sData = sCtx.getImageData(0, 0, 200, 200).data;
            let polarBuf = new Uint8Array(120 * 38 * 3);
            let offset = 0;
            for (let sector = 0; sector < 120; sector++) {
                const angle = (sector / 120) * 2 * Math.PI;
                for (let r = 0; r < 38; r++) {
                    // Внутренний радиус 60мм, внешний 300мм. В пикселях: от 20 до 100.
                    // У нас 38 диодов (индексы от 0 до 37).
                    const minRadiusPx = 20; 
                    const maxRadiusPx = 100;
                    const radiusPx = minRadiusPx + (r / 37) * (maxRadiusPx - minRadiusPx);
                    const x = Math.floor(100 + radiusPx * Math.cos(angle));
                    const y = Math.floor(100 + radiusPx * Math.sin(angle));
                    if (x >= 0 && x < 200 && y >= 0 && y < 200) {
                        const idx = (y * 200 + x) * 4;
                        polarBuf[offset++] = sData[idx]; 
                        polarBuf[offset++] = sData[idx + 1]; 
                        polarBuf[offset++] = sData[idx + 2]; 
                    } else {
                        polarBuf[offset++] = 0; polarBuf[offset++] = 0; polarBuf[offset++] = 0;
                    }
                }
            }
            framesData.push({ delay: f.delay, data: polarBuf });
        }
        return framesData;
    }
    // ===================================================================

    let currentFoundMAC = "";
    window.currentUploadBuffer = null; // Глобальный буфер для анимаций

    // --- ПОИСК И СОПРЯЖЕНИЕ ---
    function scanSlaves() {
        document.getElementById('scanStatus').innerText = "Поиск эфира...";
        document.getElementById('foundDevice').style.display = "none";
        fetch('/scan_slaves').then(() => {
            setTimeout(() => {
                fetch('/scan_results').then(res => res.json()).then(data => {
                    if (data.mac !== "") {
                        document.getElementById('scanStatus').innerText = "Устройство найдено!";
                        document.getElementById('devName').innerText = data.name + " (" + data.mac + ")";
                        currentFoundMAC = data.mac;
                        document.getElementById('foundDevice').style.display = "block";
                    } else {
                        document.getElementById('scanStatus').innerText = "Никто не найден. Убедитесь, что второе колесо горит синим.";
                    }
                });
            }, 1000);
        });
    }

    function pairDevice() {
        fetch('/pair?mac=' + currentFoundMAC).then(res => {
            if(res.ok) {
                document.getElementById('scanStatus').innerText = "ПАРА СОЗДАНА! MAC сохранен.";
                document.getElementById('foundDevice').style.display = "none";
            }
        });
    }

    window.onload = () => {
        loadFiles();
        fetch('/scan_results').then(res => res.json()).then(data => {
            if (data.paired) document.getElementById('scanStatus').innerText = "Активная пара: Установлена";
        });
        
        // Запуск телеметрии
        setInterval(updateBatteryStatus, 2000);
        updateBatteryStatus();
    };

    // --- ТЕЛЕМЕТРИЯ БАТАРЕИ ---
    function updateBatteryStatus() {
        fetch('/battery')
            .then(res => res.json())
            .then(data => {
                document.getElementById('batV').innerText = (data.vbat / 1000).toFixed(2);
                document.getElementById('batI').innerText = (data.ibat / 1000).toFixed(2);
                document.getElementById('busV').innerText = (data.vbus / 1000).toFixed(2);
                document.getElementById('busI').innerText = (data.ibus / 1000).toFixed(2);
            })
            .catch(err => console.log("Battery fetch error:", err));
    }

    // --- ЗАГРУЗКА ФАЙЛА (С ПОДДЕРЖКОЙ GIF АНИМАЦИИ) ---
    const ctx = document.getElementById('preview').getContext('2d');
    
    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        document.getElementById('preview').style.display = 'inline-block';
        window.currentUploadBuffer = null; // Сброс
        
        const reader = new FileReader();
        reader.onload = (event) => {
            if (file.name.toLowerCase().endsWith('.gif')) {
                // Это GIF - парсим его нашим собственным парсером
                try {
                    document.getElementById('uploadStatus').innerText = "Распаковка кадров GIF...";
                    let gif = new MinimalGIF(event.target.result);
                    gif.parse();
                    let frames = renderGIFFrames(gif);
                    
                    // Формируем комбинированный ANIM-буфер для ESP32
                    let totalSize = 8 + frames.length * 120 * 38 * 3;
                    let outBuf = new Uint8Array(totalSize);
                    outBuf[0] = 65; outBuf[1] = 78; outBuf[2] = 73; outBuf[3] = 77; // "ANIM"
                    outBuf[4] = frames.length & 0xFF; outBuf[5] = (frames.length >> 8) & 0xFF;
                    let defaultDelay = frames[0].delay || 100;
                    outBuf[6] = defaultDelay & 0xFF; outBuf[7] = (defaultDelay >> 8) & 0xFF;
                    
                    let offset = 8;
                    for (let f of frames) {
                        outBuf.set(f.data, offset);
                        offset += f.data.length;
                    }
                    window.currentUploadBuffer = outBuf;
                    document.getElementById('uploadStatus').innerText = `GIF обработан (Кадров: ${frames.length}). Готов к загрузке.`;
                } catch(err) {
                    alert("Ошибка при разборе GIF: " + err.message);
                    document.getElementById('uploadStatus').innerText = "Ошибка парсинга.";
                }
            } else {
                // Статичная картинка: загружаем через Image(), как раньше
                const img = new Image();
                img.onload = () => {
                    const size = Math.min(img.width, img.height);
                    ctx.clearRect(0, 0, 200, 200);
                    ctx.drawImage(img, (img.width - size)/2, (img.height - size)/2, size, size, 0, 0, 200, 200);
                    document.getElementById('uploadStatus').innerText = "Картинка загружена. Готова к конвертации.";
                }
                img.src = event.target.result;
            }
        };
        
        // Для предпросмотра GIF тоже загружаем его как DataURL в img
        const imgReader = new FileReader();
        imgReader.onload = (ev) => {
            const img = new Image();
            img.onload = () => {
                const size = Math.min(img.width, img.height);
                ctx.clearRect(0, 0, 200, 200);
                ctx.drawImage(img, (img.width - size)/2, (img.height - size)/2, size, size, 0, 0, 200, 200);
            }
            img.src = ev.target.result;
        }
        
        if (file.name.toLowerCase().endsWith('.gif')) {
            reader.readAsArrayBuffer(file);
            imgReader.readAsDataURL(file); // Для канвас-превью первого кадра
        } else {
            reader.readAsDataURL(file);
        }
    });

    async function processAndUpload() {
        if (!document.getElementById('fileInput').files[0]) return alert("Выберите файл!");
        document.getElementById('uploadStatus').innerText = "Конвертация и загрузка...";
        
        let outputBuffer;
        
        // Если это анимация (буфер уже сформирован парсером MinimalGIF)
        if (window.currentUploadBuffer) {
            outputBuffer = window.currentUploadBuffer;
        } 
        // Если это статичная картинка
        else {
            const imgData = ctx.getImageData(0, 0, 200, 200);
            const data = imgData.data;
            outputBuffer = new Uint8Array(120 * 38 * 3);
            let offset = 0;
            
            for (let sector = 0; sector < 120; sector++) {
                const angle = (sector / 120) * 2 * Math.PI;
                for (let r = 0; r < 38; r++) {
                    // Коррекция геометрии: вырезаем центральную нерабочую зону
                    const minRadiusPx = 20; 
                    const maxRadiusPx = 100;
                    const radiusPx = minRadiusPx + (r / 37) * (maxRadiusPx - minRadiusPx);
                    const x = Math.floor(100 + radiusPx * Math.cos(angle));
                    const y = Math.floor(100 + radiusPx * Math.sin(angle));
                    if (x >= 0 && x < 200 && y >= 0 && y < 200) {
                        const idx = (y * 200 + x) * 4;
                        outputBuffer[offset++] = data[idx]; outputBuffer[offset++] = data[idx + 1]; outputBuffer[offset++] = data[idx + 2]; 
                    } else {
                        outputBuffer[offset++] = 0; outputBuffer[offset++] = 0; outputBuffer[offset++] = 0;
                    }
                }
            }
        }

        // Логика захвата имени файла
        let nameInput = document.getElementById('fileNameInput').value.trim();
        const fileName = nameInput ? (nameInput + ".bin") : ("img_" + Date.now() + ".bin");
        document.getElementById('uploadStatus').innerText = "Загрузка в память устройства...";
        
        try {
            const response = await fetch(`/upload?name=${fileName}`, { method: 'POST', body: outputBuffer });
            if (response.ok) {
                document.getElementById('uploadStatus').innerText = "Успешно!";
                document.getElementById('fileNameInput').value = ""; // Очищаем после загрузки
                loadFiles(); 
            }
        } catch (e) { document.getElementById('uploadStatus').innerText = "Ошибка загрузки!"; }
    }

    // --- ФАЙЛОВЫЙ МЕНЕДЖЕР ---
    function loadFiles() {
        fetch('/list').then(r => r.json()).then(files => {
            const list = document.getElementById('fileList');
            list.innerHTML = "";
            if (files.length === 0) list.innerHTML = "<i>Память пуста</i>";
            files.forEach(f => {
                list.innerHTML += `
                    <div class="file-item">
                        <span>${f}</span>
                        <div>
                            <button onclick="playFile('${f}')">Показать</button>
                            <button onclick="deleteFile('${f}')" class="danger">X</button>
                        </div>
                    </div>`;
            });
        });
    }

    function playFile(name) {
        fetch(`/play?file=${name}`).then(() => alert("Выведено на экран!"));
    }

    function stopDisplay() {
        fetch('/stop').then(() => {
            alert("Рендеринг остановлен!");
            document.getElementById('uploadStatus').innerText = "Ожидание файла...";
        });
    }

    function deleteFile(name) {
        if(confirm("Удалить " + name + "?")) {
            fetch(`/delete?file=${name}`).then(() => loadFiles());
        }
    }

    // --- НАСТРОЙКИ ---
    function syncSettings() {
        const bmin = document.getElementById('bMinSlide').value;
        const bmax = document.getElementById('bMaxSlide').value;
        const a = document.getElementById('aSlide').value;
        
        document.getElementById('bMinVal').innerText = bmin;
        document.getElementById('bMaxVal').innerText = bmax;
        document.getElementById('aVal').innerText = a;
        
        fetch(`/settings?bmin=${bmin}&bmax=${bmax}&a=${a}`);
    }
</script>
</body>
</html>
