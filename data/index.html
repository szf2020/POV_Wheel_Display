<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POV WHEEL CONTROL</title>
<style>
:root {
    --c: #00d4ff; --c2: #0055ff; --acc: #ff8800;
    --bg: #050510; --card: #08101e; --border: #00d4ff33;
    --text: #a0d8ef; --dim: #3a5a6a; --danger: #ff2244;
    --ok: #00ff88; --glow: rgba(0,212,255,0.15);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: 'Courier New', Consolas, monospace;
    background: var(--bg); color: var(--text);
    padding: 16px; min-height: 100vh;
    background-image:
        linear-gradient(rgba(0,212,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.025) 1px, transparent 1px);
    background-size: 40px 40px;
}
header {
    text-align: center; margin-bottom: 20px; padding: 14px 0;
    border-bottom: 1px solid var(--border);
}
header h1 {
    font-size: 1.4em; letter-spacing: 0.25em; color: var(--c);
    text-shadow: 0 0 18px var(--c);
}
header .sub { font-size: 0.68em; color: var(--dim); letter-spacing: 0.15em; margin-top: 5px; }
.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px; max-width: 860px; margin: 0 auto;
}
.full { grid-column: 1 / -1; }
.panel {
    background: var(--card); border: 1px solid var(--border);
    padding: 16px; position: relative;
    box-shadow: 0 0 18px var(--glow), inset 0 0 18px rgba(0,212,255,0.03);
}
.panel::before {
    content: ''; position: absolute; top: 0; left: 0;
    width: 7px; height: 7px; border-top: 2px solid var(--c); border-left: 2px solid var(--c);
}
.panel::after {
    content: ''; position: absolute; bottom: 0; right: 0;
    width: 7px; height: 7px; border-bottom: 2px solid var(--c); border-right: 2px solid var(--c);
}
.panel-title {
    font-size: 0.62em; letter-spacing: 0.2em; color: var(--c);
    text-transform: uppercase; margin-bottom: 13px;
    padding-bottom: 7px; border-bottom: 1px solid var(--border);
}
button {
    background: transparent; border: 1px solid var(--c); color: var(--c);
    padding: 7px 14px; cursor: pointer; font-family: inherit;
    font-size: 0.72em; letter-spacing: 0.1em; text-transform: uppercase;
    transition: all 0.15s;
    clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
}
button:hover { background: var(--c); color: var(--bg); box-shadow: 0 0 12px var(--c); }
button.danger { border-color: var(--danger); color: var(--danger); clip-path: none; }
button.danger:hover { background: var(--danger); color: #fff; box-shadow: 0 0 10px var(--danger); }
button.full-w { width: 100%; clip-path: none; margin-top: 8px; }
input[type="text"], input[type="file"] {
    background: #0a1628; color: var(--text); border: 1px solid var(--border);
    padding: 8px 10px; width: 100%; margin-bottom: 10px;
    font-family: inherit; font-size: 0.78em; outline: none;
}
input[type="text"]:focus { border-color: var(--c); box-shadow: 0 0 8px rgba(0,212,255,0.25); }
input[type="file"] { cursor: pointer; color: var(--dim); }

/* ---- Dual-range brightness slider ---- */
.bri-wrap { position: relative; height: 32px; margin: 8px 0 4px; user-select: none; }
.bri-track {
    position: absolute; top: 50%; left: 0; right: 0;
    height: 4px; background: #0a2040; transform: translateY(-50%);
}
.bri-fill {
    position: absolute; top: 50%; height: 4px;
    background: linear-gradient(90deg, #0055ff, #00d4ff);
    transform: translateY(-50%); pointer-events: none;
}
.bri-cursor {
    position: absolute; top: 50%; transform: translate(-50%, -50%);
    width: 10px; height: 10px; background: var(--acc);
    clip-path: polygon(50% 0%,100% 50%,50% 100%,0% 50%);
    pointer-events: none; z-index: 10;
    box-shadow: 0 0 8px var(--acc);
    transition: left 0.3s;
}
.bri-wrap input[type="range"] {
    position: absolute; width: 100%; height: 32px; top: 0; left: 0; margin: 0; padding: 0;
    -webkit-appearance: none; appearance: none;
    background: transparent; outline: none; pointer-events: none;
}
.bri-wrap input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 16px; height: 16px; background: var(--c);
    clip-path: polygon(50% 0%,100% 50%,50% 100%,0% 50%);
    cursor: pointer; pointer-events: all;
    box-shadow: 0 0 8px var(--c);
}
.bri-wrap input[type="range"]::-moz-range-thumb {
    width: 16px; height: 16px; background: var(--c);
    border: none; cursor: pointer; pointer-events: all; border-radius: 0;
}
.bri-labels {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 0.63em; color: var(--dim); margin-bottom: 10px;
}
.bri-labels .now { color: var(--acc); font-size: 1.05em; }
.bri-labels b { color: var(--c); }
.bri-labels .now b { color: var(--acc); }

/* ---- Angle slider ---- */
.slider-row { margin-bottom: 12px; }
.slider-row label { display: flex; justify-content: space-between; font-size: 0.68em; letter-spacing: 0.07em; margin-bottom: 5px; }
.slider-row label span { color: var(--c); }
input.angle-slide {
    -webkit-appearance: none; appearance: none; width: 100%; height: 3px;
    background: #0a2040; outline: none; pointer-events: all;
}
input.angle-slide::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 14px; height: 14px; background: var(--c);
    clip-path: polygon(50% 0%,100% 50%,50% 100%,0% 50%);
    cursor: pointer; box-shadow: 0 0 8px var(--c);
}
input.angle-slide::-moz-range-thumb {
    width: 14px; height: 14px; background: var(--c);
    border: none; cursor: pointer; border-radius: 0;
}

/* ---- File list ---- */
.file-item {
    display: flex; align-items: center;
    border: 1px solid var(--border); padding: 7px 10px;
    margin-bottom: 5px; background: #060f1c; gap: 8px;
}
.file-item .fname { flex: 1; font-size: 0.72em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.file-item .fsize { font-size: 0.62em; color: var(--dim); white-space: nowrap; }
.file-item .acts { display: flex; gap: 4px; }
.file-item button { padding: 3px 10px; font-size: 0.65em; clip-path: none; }

/* ---- Stats ---- */
.stat-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; font-size: 0.75em; }
.stat-row .lbl { color: var(--dim); letter-spacing: 0.06em; }
.stat-row .val { color: var(--c); }
.fs-bar { height: 4px; background: #0a2040; margin: 6px 0 3px; }
.fs-bar-fill { height: 100%; background: linear-gradient(90deg, var(--c2), var(--c)); transition: width 0.4s; }
.fs-label { font-size: 0.62em; color: var(--dim); text-align: right; margin-bottom: 10px; }
.status-bar {
    font-size: 0.68em; color: var(--dim); margin-top: 8px;
    padding: 5px 8px; border-left: 2px solid var(--c);
    background: #060f1c; min-height: 26px;
}
.status-bar.ok { border-color: var(--ok); color: var(--ok); }
.status-bar.err { border-color: var(--danger); color: var(--danger); }

/* ---- Canvas ---- */
canvas {
    display: block; border-radius: 50%;
    border: 1px solid var(--border); background: #000;
    margin: 10px auto; box-shadow: 0 0 10px var(--glow);
    width: 160px; height: 160px; /* display size */
}

/* ---- OTA footer ---- */
.ota-footer {
    max-width: 860px; margin: 16px auto 0; text-align: center;
}
.ota-footer button {
    border-color: #ff660044; color: #ff6600; clip-path: none;
    font-size: 0.7em; padding: 6px 20px;
}
.ota-footer button:hover { background: #ff6600; color: #fff; box-shadow: 0 0 10px #ff6600; }

@media (max-width: 580px) { .grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<header>
    <h1>&#9674; POV WHEEL CONTROL &#9674;</h1>
    <div class="sub" id="deviceName">CONNECTING...</div>
</header>

<div class="grid">

<!-- UPLOAD -->
<div class="panel full">
    <div class="panel-title">// Upload Animation</div>
    <input type="file" id="fileInput" accept="image/*">
    <input type="text" id="fileNameInput" placeholder="Custom name (optional) — prefix gif_ or img_ added automatically">
    <!-- Canvas buffer 200×200, displayed at 160×160 -->
    <canvas id="preview" width="200" height="200" style="display:none;"></canvas>
    <button class="full-w" onclick="processAndUpload()">&#9654; Convert &amp; Upload</button>
    <div class="status-bar" id="uploadStatus">Waiting for file...</div>
    <div id="uploadProgressWrap" style="display:none; margin-top:5px;">
        <div class="fs-bar"><div class="fs-bar-fill" id="uploadProgressBar" style="width:0%; transition:width 0.15s;"></div></div>
    </div>
</div>

<!-- STORAGE -->
<div class="panel full">
    <div class="panel-title">// Storage — Device Memory</div>
    <div class="fs-bar"><div class="fs-bar-fill" id="fsFill" style="width:0%"></div></div>
    <div class="fs-label" id="fsLabel">Loading...</div>
    <div id="fileList"></div>
    <button class="full-w danger" onclick="stopDisplay()">&#9632; Stop Display</button>
</div>

<!-- SETTINGS -->
<div class="panel">
    <div class="panel-title">// Display Settings</div>

    <!-- Dual-range brightness -->
    <div style="font-size:0.63em;letter-spacing:0.1em;color:var(--dim);margin-bottom:5px;">BRIGHTNESS RANGE</div>
    <div class="bri-wrap">
        <div class="bri-track"></div>
        <div class="bri-fill" id="drFill"></div>
        <div class="bri-cursor" id="drCursor" style="left:0%"></div>
        <input type="range" id="bMinSlide" min="10" max="50" value="10">
        <input type="range" id="bMaxSlide" min="10" max="50" value="50">
    </div>
    <div class="bri-labels">
        <span>MIN&nbsp;<b id="bMinVal">10</b>%</span>
        <span class="now">NOW&nbsp;<b id="briVal">--</b>%</span>
        <span>MAX&nbsp;<b id="bMaxVal">50</b>%</span>
    </div>

    <!-- Angle -->
    <div class="slider-row">
        <label>ANGLE OFFSET <span id="aVal">0</span>&deg;</label>
        <input class="angle-slide" type="range" id="aSlide" min="0" max="360" value="0"
               oninput="document.getElementById('aVal').textContent=this.value; syncSettings()">
    </div>

    <!-- Gamma correction -->
    <div class="slider-row">
        <label>GAMMA CORRECTION <span id="gVal">2.2</span></label>
        <input class="angle-slide" type="range" id="gSlide" min="10" max="40" value="22"
               oninput="document.getElementById('gVal').textContent=(this.value/10).toFixed(1); syncSettings()">
    </div>
</div>

<!-- POWER -->
<div class="panel">
    <div class="panel-title">// Power Status</div>
    <div class="stat-row"><span class="lbl">BATTERY VOLTAGE</span><span class="val" id="batV">--</span>&nbsp;V</div>
    <div class="stat-row"><span class="lbl">CHARGE CURRENT</span><span class="val" id="batI">--</span>&nbsp;A</div>
    <div class="stat-row"><span class="lbl">INPUT VOLTAGE</span><span class="val" id="busV">--</span>&nbsp;V</div>
    <div class="stat-row"><span class="lbl">INPUT CURRENT</span><span class="val" id="busI">--</span>&nbsp;A</div>
</div>

</div><!-- /grid -->

<div class="ota-footer">
    <button onclick="fetch('/ping').then(()=>window.location.href='/update')">&#8679; OTA Firmware Update</button>
</div>

<script>
// ===================== GIF PARSER =====================
class MinimalGIF {
    constructor(b) { this.bytes=new Uint8Array(b); this.pos=0; this.frames=[]; this.width=0; this.height=0; this.globalColorTable=null; }
    readByte() { return this.bytes[this.pos++]; }
    readWord() { return this.readByte()|(this.readByte()<<8); }
    readBytes(n) { let b=this.bytes.subarray(this.pos,this.pos+n); this.pos+=n; return b; }

    parse() {
        let sig=String.fromCharCode(...this.readBytes(6));
        if(sig!=='GIF87a'&&sig!=='GIF89a') throw new Error("Not a GIF");
        this.width=this.readWord(); this.height=this.readWord();
        let packed=this.readByte(); this.readByte(); this.readByte();
        if(packed&0x80) this.globalColorTable=this.readBytes((2<<(packed&7))*3);
        let delay=100,disposal=0,transIndex=-1;
        while(this.pos<this.bytes.length){
            let bt=this.readByte();
            if(bt===0x3B) break;
            if(bt===0x21){
                let et=this.readByte();
                if(et===0xF9){
                    this.readByte(); let gce=this.readByte();
                    disposal=(gce>>2)&7; delay=this.readWord()*10||100;
                    let tc=this.readByte(); transIndex=(gce&1)?tc:-1; this.readByte();
                } else { let l; while((l=this.readByte())!==0) this.pos+=l; }
            } else if(bt===0x2C){
                let x=this.readWord(),y=this.readWord(),w=this.readWord(),h=this.readWord();
                let ip=this.readByte(), lctF=(ip&0x80)!==0;
                let lct=lctF?this.readBytes((2<<(ip&7))*3):this.globalColorTable;
                let mcs=this.readByte(), id=[],l;
                while((l=this.readByte())!==0){for(let i=0;i<l;i++) id.push(this.bytes[this.pos+i]); this.pos+=l;}
                let pix=this.lzwDecode(mcs,new Uint8Array(id),w*h);
                this.frames.push({x,y,w,h,pixels:pix,lct,delay,disposal,transIndex});
            }
        }
    }

    lzwDecode(mcs,data,pc){
        const cc=1<<mcs,eoi=cc+1; let cs=mcs+1,ds=cc+2,dict=[];
        for(let i=0;i<cc;i++) dict[i]=[i];
        let out=new Uint8Array(pc),op=0,bp=0;
        function rc(){
            let by=bp>>3,bo=bp&7; if(by>=data.length) return -1;
            let v=data[by]|(data[by+1]!==undefined?data[by+1]<<8:0)|(data[by+2]!==undefined?data[by+2]<<16:0);
            let c=(v>>bo)&((1<<cs)-1); bp+=cs; return c;
        }
        let oc=-1;
        while(op<pc){
            let c=rc(); if(c===-1||c===eoi) break;
            if(c===cc){cs=mcs+1;ds=cc+2;dict.length=cc+2;oc=-1;continue;}
            let seq; if(c<ds) seq=dict[c]; else if(c===ds&&oc!==-1){seq=Array.from(dict[oc]);seq.push(dict[oc][0]);}else break;
            out.set(seq,op); op+=seq.length;
            if(oc!==-1&&ds<4096){let ne=Array.from(dict[oc]);ne.push(seq[0]);dict[ds++]=ne;if(ds===(1<<cs)&&cs<12)cs++;}
            oc=c;
        }
        return out;
    }
}

// ===================== POLAR MAPPING =====================
// 360 sectors × 38 LEDs = 41040 bytes == FRAME_SIZE on device
// Image is sampled as a centered square; inner cutout mirrors physical LED offset from hub
function toPolarBuffer(srcCanvas) {
    const W = srcCanvas.width, H = srcCanvas.height;
    const ctx = srcCanvas.getContext('2d', {willReadFrequently: true});
    const sData = ctx.getImageData(0, 0, W, H).data;
    const buf = new Uint8Array(360 * 38 * 3);
    let off = 0;
    const minR = W * 0.10;   // inner cutout  (~60mm physical)
    const maxR = W * 0.495;  // outer edge    (~300mm physical)
    for (let sector = 0; sector < 360; sector++) {
        const angle = (sector / 360) * 2 * Math.PI;
        const ca = Math.cos(angle), sa = Math.sin(angle);
        for (let r = 0; r < 38; r++) {
            const rad = minR + (r / 37) * (maxR - minR);
            const px = Math.round(W / 2 + rad * ca);
            const py = Math.round(H / 2 + rad * sa);
            if (px >= 0 && px < W && py >= 0 && py < H) {
                const idx = (py * W + px) * 4;
                buf[off++] = sData[idx];     // R
                buf[off++] = sData[idx + 1]; // G
                buf[off++] = sData[idx + 2]; // B
            } else {
                buf[off++] = 0; buf[off++] = 0; buf[off++] = 0;
            }
        }
    }
    return buf;
}

// Render all GIF frames to polar buffers
function renderGIFFrames(gif) {
    const canvas = document.createElement('canvas');
    canvas.width = gif.width; canvas.height = gif.height;
    const ctx = canvas.getContext('2d', {willReadFrequently: true});
    const sq = Math.min(gif.width, gif.height);
    // Working canvas — square, centered crop, 200×200
    const work = document.createElement('canvas');
    work.width = 200; work.height = 200;
    const wCtx = work.getContext('2d', {willReadFrequently: true});
    const frames = [];

    for (let i = 0; i < gif.frames.length; i++) {
        const f = gif.frames[i];
        if (f.disposal === 2 && i > 0) {
            const pf = gif.frames[i-1];
            ctx.clearRect(pf.x, pf.y, pf.w, pf.h);
        }
        const imgData = ctx.createImageData(f.w, f.h);
        let p = 0;
        for (let j = 0; j < f.pixels.length; j++) {
            const c = f.pixels[j];
            if (c !== f.transIndex && f.lct) {
                imgData.data[p++] = f.lct[c*3];
                imgData.data[p++] = f.lct[c*3+1];
                imgData.data[p++] = f.lct[c*3+2];
                imgData.data[p++] = 255;
            } else { imgData.data[p++]=0; imgData.data[p++]=0; imgData.data[p++]=0; imgData.data[p++]=0; }
        }
        const tmp = document.createElement('canvas');
        tmp.width = f.w; tmp.height = f.h;
        tmp.getContext('2d').putImageData(imgData, 0, 0);
        ctx.drawImage(tmp, f.x, f.y);
        // Center-crop to square, scale to 200×200
        wCtx.clearRect(0, 0, 200, 200);
        wCtx.drawImage(canvas, (gif.width - sq)/2, (gif.height - sq)/2, sq, sq, 0, 0, 200, 200);
        frames.push({ delay: f.delay, data: toPolarBuffer(work) });
    }
    return frames;
}

// ===================== STATE =====================
window.currentUploadBuffer = null;
const previewCanvas = document.getElementById('preview'); // 200×200 buffer, 160×160 display
const previewCtx = previewCanvas.getContext('2d', {willReadFrequently: true});

// ===================== FILE INPUT =====================
document.getElementById('fileInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    previewCanvas.style.display = 'inline-block';
    window.currentUploadBuffer = null;
    setStatus('uploadStatus', `Reading "${file.name}"...`, '');

    if (file.name.toLowerCase().endsWith('.gif')) {
        const reader = new FileReader();
        reader.onload = ev => {
            try {
                setStatus('uploadStatus', 'Decoding GIF frames...', '');
                const gif = new MinimalGIF(ev.target.result);
                gif.parse();
                const frames = renderGIFFrames(gif);
                const frameBytes = 360 * 38 * 3;
                const totalSize = 8 + frames.length * frameBytes;
                const outBuf = new Uint8Array(totalSize);
                outBuf[0]=65;outBuf[1]=78;outBuf[2]=73;outBuf[3]=77; // "ANIM"
                outBuf[4]=frames.length&0xFF; outBuf[5]=(frames.length>>8)&0xFF;
                const dd = frames[0].delay || 100;
                outBuf[6]=dd&0xFF; outBuf[7]=(dd>>8)&0xFF;
                let off = 8;
                for (const f of frames) { outBuf.set(f.data, off); off += f.data.length; }
                window.currentUploadBuffer = outBuf;
                setStatus('uploadStatus', `GIF ready — ${frames.length} frame(s), ${(totalSize/1024).toFixed(1)} kB`, 'ok');
            } catch(err) { setStatus('uploadStatus', 'GIF parse error: ' + err.message, 'err'); }
        };
        reader.readAsArrayBuffer(file);
        // Preview first GIF frame via browser
        const r2 = new FileReader();
        r2.onload = ev => {
            const img = new Image();
            img.onload = () => drawCenteredSquare(img, previewCtx, 200);
            img.src = ev.target.result;
        };
        r2.readAsDataURL(file);
    } else {
        const reader = new FileReader();
        reader.onload = ev => {
            const img = new Image();
            img.onload = () => {
                drawCenteredSquare(img, previewCtx, 200);
                setStatus('uploadStatus', `Image loaded (${img.width}×${img.height}). Ready to upload.`, 'ok');
            };
            img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
    }
});

// Draw image centered and square-cropped into a ctx of given size
function drawCenteredSquare(img, ctx, size) {
    const sq = Math.min(img.width, img.height);
    const sx = (img.width  - sq) / 2;
    const sy = (img.height - sq) / 2;
    ctx.clearRect(0, 0, size, size);
    ctx.drawImage(img, sx, sy, sq, sq, 0, 0, size, size);
}

// ===================== UPLOAD =====================
async function processAndUpload() {
    const fileEl = document.getElementById('fileInput');
    if (!fileEl.files[0]) { setStatus('uploadStatus', 'Select a file first.', 'err'); return; }
    const file = fileEl.files[0];
    const isGif = file.name.toLowerCase().endsWith('.gif');
    const prefix = isGif ? 'gif_' : 'img_';
    const baseName = file.name.replace(/\.[^/.]+$/, '');
    const nameInput = document.getElementById('fileNameInput').value.trim();
    const fileName = prefix + (nameInput || baseName) + '.bin';

    setStatus('uploadStatus', `Converting → ${fileName}...`, '');

    let outputBuffer;
    if (window.currentUploadBuffer) {
        outputBuffer = window.currentUploadBuffer;
    } else {
        // Static image: use previewCanvas (200×200 buffer with centered crop)
        outputBuffer = toPolarBuffer(previewCanvas);
    }

    const progBar  = document.getElementById('uploadProgressBar');
    const progWrap = document.getElementById('uploadProgressWrap');
    progWrap.style.display = 'block';
    progBar.style.width = '0%';
    setStatus('uploadStatus', `Uploading 0%  ·  0 / ${(outputBuffer.length/1024).toFixed(1)} kB`, '');

    await new Promise(resolve => {
        const xhr = new XMLHttpRequest();
        xhr.open('POST', `/upload?name=${encodeURIComponent(fileName)}`);
        xhr.upload.addEventListener('progress', e => {
            if (e.lengthComputable) {
                const p = e.loaded / e.total * 100;
                progBar.style.width = p.toFixed(1) + '%';
                setStatus('uploadStatus',
                    `Uploading ${p.toFixed(0)}%  ·  ${(e.loaded/1024).toFixed(1)} / ${(e.total/1024).toFixed(1)} kB`, '');
            }
        });
        xhr.onload = () => {
            progWrap.style.display = 'none';
            if (xhr.status === 200) {
                setStatus('uploadStatus', `Uploaded: ${fileName}`, 'ok');
                document.getElementById('fileNameInput').value = '';
                loadFiles(); loadFSInfo();
            } else {
                setStatus('uploadStatus', 'Upload failed (server error).', 'err');
            }
            resolve();
        };
        xhr.onerror = () => {
            progWrap.style.display = 'none';
            setStatus('uploadStatus', 'Upload error.', 'err');
            resolve();
        };
        xhr.send(outputBuffer);
    });
}

// ===================== FILE MANAGER =====================
function loadFiles() {
    fetch('/list').then(r => r.json()).then(files => {
        const list = document.getElementById('fileList');
        if (!files.length) {
            list.innerHTML = '<div style="color:var(--dim);font-size:0.72em;padding:8px;">No files stored.</div>';
            return;
        }
        list.innerHTML = files.map(f =>
            `<div class="file-item">
                <span class="fname">${f.name}</span>
                <span class="fsize">${(f.size/1024).toFixed(1)}&nbsp;kB</span>
                <div class="acts">
                    <button onclick="playFile('${f.name}')">&#9654;</button>
                    <button class="danger" onclick="deleteFile('${f.name}')">&#10005;</button>
                </div>
             </div>`
        ).join('');
    });
}

function loadFSInfo() {
    fetch('/fs_info').then(r => r.json()).then(d => {
        const pct = d.total ? (d.used / d.total * 100) : 0;
        document.getElementById('fsFill').style.width = pct.toFixed(1) + '%';
        document.getElementById('fsLabel').textContent =
            `${(d.free/1024).toFixed(0)} kB free of ${(d.total/1024).toFixed(0)} kB`;
    });
}

function playFile(name)   { fetch(`/play?file=${encodeURIComponent(name)}`); }
function stopDisplay()    { fetch('/stop'); }
function deleteFile(name) { fetch(`/delete?file=${encodeURIComponent(name)}`).then(() => { loadFiles(); loadFSInfo(); }); }

// ===================== DUAL-RANGE BRIGHTNESS SLIDER =====================
function pct(v) { return (v - 10) / 40 * 100; }

// Хранит последнее известное значение NOW для пересчёта при движении ползунков
let currentBrightness = 0;

function updateDualRange() {
    const minV = +document.getElementById('bMinSlide').value;
    const maxV = +document.getElementById('bMaxSlide').value;
    const fill = document.getElementById('drFill');
    fill.style.left  = pct(minV) + '%';
    fill.style.width = (pct(maxV) - pct(minV)) + '%';
    document.getElementById('bMinVal').textContent = minV;
    document.getElementById('bMaxVal').textContent = maxV;
    // Немедленно пересчитать позицию NOW в новых границах
    updateBriCursor(currentBrightness);
}

function updateBriCursor(val) {
    currentBrightness = val;
    const minV = +document.getElementById('bMinSlide').value;
    const maxV = +document.getElementById('bMaxSlide').value;
    // NOW всегда внутри диапазона [min, max] — ни визуально, ни реально не выходит за границы
    const displayVal = Math.min(Math.max(val, minV), maxV);
    document.getElementById('drCursor').style.left = pct(displayVal) + '%';
    document.getElementById('briVal').textContent = displayVal;
}

// Дебаунс: синхронизируем не чаще 1 раза в 50 мс при перетаскивании ползунка
let _syncTimer = null;
function syncSettings() {
    if (_syncTimer) clearTimeout(_syncTimer);
    _syncTimer = setTimeout(() => {
        const bmin = document.getElementById('bMinSlide').value;
        const bmax = document.getElementById('bMaxSlide').value;
        const a    = document.getElementById('aSlide').value;
        const g    = (document.getElementById('gSlide').value / 10).toFixed(1);
        fetch(`/settings?bmin=${bmin}&bmax=${bmax}&a=${a}&g=${g}`);
        _syncTimer = null;
    }, 50);
}

document.getElementById('bMinSlide').addEventListener('input', function() {
    const maxSlide = document.getElementById('bMaxSlide');
    if (+this.value > +maxSlide.value) this.value = maxSlide.value;
    // Поднимаем min поверх: пользователь активно его двигает
    this.style.zIndex = 5;
    maxSlide.style.zIndex = '';
    updateDualRange();
    syncSettings();
});

document.getElementById('bMaxSlide').addEventListener('input', function() {
    const minSlide = document.getElementById('bMinSlide');
    if (+this.value < +minSlide.value) this.value = minSlide.value;
    // Поднимаем max поверх: пользователь активно его двигает
    this.style.zIndex = 5;
    minSlide.style.zIndex = '';
    updateDualRange();
    syncSettings();
});

// ===================== SETTINGS =====================
function loadSettings() {
    fetch('/get_settings').then(r => r.json()).then(d => {
        document.getElementById('bMinSlide').value = d.bmin;
        document.getElementById('bMaxSlide').value = d.bmax;
        document.getElementById('aSlide').value    = d.angle;
        document.getElementById('aVal').textContent = d.angle;
        if (d.gamma !== undefined) {
            document.getElementById('gSlide').value = Math.round(d.gamma * 10);
            document.getElementById('gVal').textContent = parseFloat(d.gamma).toFixed(1);
        }
        updateDualRange();
        updateBriCursor(d.brightness);
    }).catch(() => {});
}

// ===================== BATTERY =====================
function updateBatteryStatus() {
    fetch('/battery').then(r => r.json()).then(d => {
        document.getElementById('batV').textContent = (d.vbat/1000).toFixed(2);
        document.getElementById('batI').textContent = (d.ibat/1000).toFixed(2);
        document.getElementById('busV').textContent = (d.vbus/1000).toFixed(2);
        document.getElementById('busI').textContent = (d.ibus/1000).toFixed(2);
    }).catch(() => {});
}

// ===================== HELPERS =====================
function setStatus(id, msg, cls) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.className = 'status-bar' + (cls ? ' ' + cls : '');
}

// ===================== INIT =====================
window.onload = () => {
    fetch('/ping').then(() => {
        document.getElementById('deviceName').textContent = window.location.hostname || 'pov-wheel';
    });

    loadFiles();
    loadFSInfo();
    loadSettings();
    updateBatteryStatus();

    // NOW-яркость: 500 мс — быстрый отклик при изменении освещения или ползунков
    setInterval(() => {
        fetch('/get_settings').then(r => r.json()).then(d => updateBriCursor(d.brightness)).catch(() => {});
    }, 500);
    // Батарея: 2 с — медленный опрос, т.к. требует I2C ADC замеров
    setInterval(updateBatteryStatus, 2000);
};
</script>
